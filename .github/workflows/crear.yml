name: Java application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Compilar la app
      run: javac App.java AppTest.java

    - name: Ejecutar pruebas
      run: java AppTest

    - name: Ejecutar la app
      run: java App

    - name: Simular el deploy
      run: echo "Simular que se esta desplegando"

    - name: Construir la imagen de docker
      run: docker build -t ghcr.io/ksanivesela/hello-kevin-java:1.0.0 .

    - name: Login en Github container registry
      run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Publicar la imagen
      run: docker push ghcr.io/ksanivesela/hello-kevin-java:1.0.0